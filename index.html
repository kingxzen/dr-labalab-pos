<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DR LABALAB POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    body{font-family:Inter,sans-serif;background:#f8fafc;color:#111827}.material-symbols-outlined{vertical-align:middle}.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#111827;color:white;padding:12px 16px;border-radius:14px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 12px 28px rgba(0,0,0,.22);display:none}.toast.show{display:block}.nav-active{color:#1e40af}.card{background:white;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  </style>
</head>
<body>
<div id="app"></div><div id="toast" class="toast"></div>
<script>
const state={route:'dashboard',loads:1,orders:[{id:'ORD-2841',customer:'Marcus Thorne',staff:'Maria Santos',loads:2,amount:380,status:'Delayed',time:'2h 15m'},{id:'ORD-2845',customer:'Elena Rodriguez',staff:'Ana Reyes',loads:1,amount:190,status:'In Progress',time:'32m'},{id:'ORD-2849',customer:'Juan Dela Cruz',staff:'Liza Cruz',loads:3,amount:570,status:'Ready For Pickup',time:'Ready'}],inventory:[['Detergent',12,'Low Stock'],['Fabric Conditioner',85,'Stable'],['Laundry Plastic',18,'Low Stock'],['Customer Tags',64,'Stable']],staff:[['Maria Santos',12,2280,800,'Excellent'],['Ana Reyes',9,1710,800,'Good'],['Liza Cruz',5,950,800,'Needs Attention']]};
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function go(route){state.route=route;render();window.scrollTo(0,0)}
function icon(i){return `<span class="material-symbols-outlined">${i}</span>`}
function shell(title,body){const nav=[['dashboard','Home','dashboard'],['orders','Orders','local_laundry_service'],['customers','Customers','groups'],['inventory','Inventory','inventory_2'],['reports','Reports','bar_chart']];return `<div class="min-h-screen pb-24"><header class="fixed top-0 left-0 right-0 h-16 bg-white border-b z-50 flex items-center justify-between px-4 shadow-sm"><button onclick="go('dashboard')" class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-blue-800 text-white flex items-center justify-center font-black">DR</div><b class="text-blue-800 text-lg">${title}</b></button><div class="flex gap-3 text-blue-800"><button onclick="toast('Notifications will be connected in backend v2')">${icon('notifications')}</button><button onclick="go('login')">${icon('account_circle')}</button></div></header><main class="pt-20 px-4 max-w-6xl mx-auto">${body}</main><nav class="fixed bottom-0 left-0 right-0 h-16 bg-white border-t z-50 flex justify-around">${nav.map(n=>`<button onclick="go('${n[0]}')" class="flex-1 flex flex-col items-center justify-center text-[10px] font-bold ${state.route===n[0]?'nav-active':'text-slate-400'}">${icon(n[2])}<span>${n[1]}</span></button>`).join('')}</nav></div>`}
function dashboard(){return shell('DR LABALAB',`<div class="flex items-end justify-between mb-5"><div><p class="text-xs font-bold text-slate-500 uppercase">Mabuhay, Owner!</p><h1 class="text-2xl font-black">Overview Ngayong Araw</h1></div><button onclick="go('newOrder')" class="bg-blue-800 text-white px-4 py-3 rounded-xl font-bold">+ New Order</button></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">${[['Sales Today','₱12,450'],['Completed Load Value','₱8,740'],['Loads Completed','46'],['Pending Loads','6']].map(k=>`<button onclick="go('reports')" class="card p-5 text-left"><p class="text-xs font-bold text-slate-500 uppercase">${k[0]}</p><h2 class="text-3xl font-black text-blue-800 mt-2">${k[1]}</h2></button>`).join('')}</div><div class="grid md:grid-cols-3 gap-4 mb-6">${[['In Progress','8','orders'],['Ready For Pickup','14','pickup'],['For Delivery','5','delivery']].map(k=>`<button onclick="go('${k[2]}')" class="card p-6 text-center"><div class="text-3xl font-black">${k[1]}</div><div class="text-xs font-bold uppercase text-slate-500">${k[0]}</div></button>`).join('')}</div><div class="grid md:grid-cols-2 gap-4"><button onclick="go('staff')" class="card p-5 text-left"><h3 class="font-bold mb-2">Top Staff Today</h3><p>Maria Santos — <b>12 loads</b> / ₱2,280 generated</p></button><button onclick="go('inventory')" class="bg-red-50 rounded-2xl p-5 border border-red-100 text-left"><h3 class="font-bold text-red-700">Low Stock Alert</h3><p class="text-sm">Detergent below 15%. Replenish soon.</p></button></div>`)}
function login(){return `<div class="min-h-screen flex items-center justify-center p-6"><div class="card p-8 w-full max-w-md"><div class="text-center mb-6"><div class="mx-auto w-20 h-20 rounded-full bg-blue-800 text-white flex items-center justify-center text-2xl font-black">DR</div><h1 class="text-2xl font-black text-blue-800 mt-3">DR LABALAB</h1><p class="text-sm text-slate-500">POS Management System</p></div><input class="w-full border rounded-xl p-3 mb-3" placeholder="Username"><input class="w-full border rounded-xl p-3 mb-5" type="password" placeholder="Password"><button onclick="go('dashboard')" class="w-full h-12 rounded-xl bg-blue-800 text-white font-bold">LOGIN</button></div></div>`}
function newOrder(){return shell('BAGONG ORDER',`<button onclick="go('dashboard')" class="mb-4 font-bold">← Back</button><div class="grid md:grid-cols-3 gap-5"><section class="md:col-span-2 space-y-4"><div class="card p-5"><label class="text-xs font-bold uppercase">Customer</label><input class="mt-2 w-full rounded-xl border p-3" placeholder="Name or mobile number"><button onclick="go('customers')" class="mt-3 text-blue-800 font-bold text-sm">+ Add new customer</button></div><div class="card p-5"><label class="text-xs font-bold uppercase">Service Type</label><div class="grid grid-cols-2 gap-3 mt-3">${['Wash Dry Fold','Wash Only','Dry Only','Fold Only','Comforter','Rush'].map(s=>`<button onclick="toast('${s} selected')" class="border rounded-xl p-4 font-bold hover:border-blue-800">${s}</button>`).join('')}</div></div><div class="card p-5"><label class="text-xs font-bold uppercase">Loads</label><div class="flex items-center gap-5 mt-3"><button onclick="state.loads=Math.max(1,state.loads-1);render()" class="w-12 h-12 bg-slate-100 rounded-xl">-</button><b class="text-3xl">${state.loads}</b><button onclick="state.loads++;render()" class="w-12 h-12 bg-blue-800 text-white rounded-xl">+</button></div></div></section><aside class="bg-blue-800 text-white rounded-3xl p-6 h-fit"><p class="text-blue-200 text-xs font-bold uppercase">Total Amount</p><h3 class="text-4xl font-black">₱${state.loads*190}.00</h3><button onclick="toast('Order saved');go('orders')" class="mt-6 w-full bg-white text-blue-800 rounded-xl h-12 font-bold">Save Order</button><button onclick="toast('Receipt printing will be connected later')" class="mt-3 w-full border border-blue-300 rounded-xl h-12 font-bold">Save & Print</button></aside></div>`)}
function orders(){return shell('ACTIVE ORDERS',`<div class="flex justify-between items-end mb-4"><h1 class="text-2xl font-black">Active Orders</h1><button onclick="go('newOrder')" class="bg-blue-800 text-white rounded-xl px-4 py-3 font-bold">+ New</button></div><div class="grid md:grid-cols-4 gap-3 mb-5">${[['Active',14],['In Progress',8],['Delayed',2],['Avg Time','45m']].map(k=>`<div class="card p-4"><p class="text-xs font-bold text-slate-500 uppercase">${k[0]}</p><h2 class="text-2xl font-black text-blue-800">${k[1]}</h2></div>`).join('')}</div><div class="space-y-4">${state.orders.map(o=>`<button onclick="go('orderDetails')" class="card p-5 w-full text-left"><div class="flex justify-between"><div><p class="text-xs font-bold text-slate-400">#${o.id}</p><h3 class="text-lg font-black">${o.customer}</h3></div><span class="text-xs font-bold px-2 py-1 rounded bg-slate-100">${o.status}</span></div><p class="text-sm mt-3">${o.staff} • ${o.loads} load(s) • ₱${o.amount} • ${o.time}</p></button>`).join('')}</div>`)}
function customers(){return shell('CUSTOMERS',`<div class="grid lg:grid-cols-2 gap-5"><div class="card p-5 space-y-3"><h2 class="text-xl font-black">Add Customer</h2><input class="w-full border rounded-xl p-3" placeholder="Full name"><input class="w-full border rounded-xl p-3" placeholder="Mobile number"><textarea class="w-full border rounded-xl p-3" placeholder="Address"></textarea><button onclick="toast('Customer saved')" class="w-full bg-blue-800 text-white rounded-xl h-12 font-bold">Save Customer</button></div><div class="space-y-3"><h2 class="text-xl font-black">Recent Customers</h2>${['Alice Smith','Robert Johnson','Maria Klein'].map(c=>`<div class="card p-4 flex justify-between items-center"><b>${c}</b><button onclick="go('newOrder')" class="text-blue-800 font-bold">New Order</button></div>`).join('')}</div></div>`)}
function inventory(){return shell('INVENTORY',`<div class="flex justify-between mb-5"><h1 class="text-2xl font-black">Supplies Inventory</h1><button onclick="toast('Add item form will be connected in backend')" class="bg-blue-800 text-white rounded-xl px-4 py-3 font-bold">+ Add Item</button></div><div class="grid md:grid-cols-2 gap-4">${state.inventory.map(i=>`<div class="card p-5"><div class="flex justify-between"><b>${i[0]}</b><span class="text-xs font-bold ${i[2]==='Low Stock'?'text-red-600':'text-green-600'}">${i[2]}</span></div><div class="h-2 bg-slate-100 rounded mt-4"><div class="h-2 rounded ${i[2]==='Low Stock'?'bg-red-500':'bg-blue-800'}" style="width:${i[1]}%"></div></div><p class="text-sm mt-2">${i[1]}% remaining</p><div class="flex gap-2 mt-3"><button onclick="toast('Stock usage recorded')" class="bg-slate-100 rounded-lg px-3 py-2 text-xs font-bold">Use</button><button onclick="toast('Stock added')" class="bg-blue-800 text-white rounded-lg px-3 py-2 text-xs font-bold">Add Stock</button></div></div>`).join('')}</div>`)}
function staff(){return shell('STAFF PRODUCTIVITY',`<div class="grid md:grid-cols-3 gap-4 mb-5">${[['Active Staff','3'],['Loads Today','26'],['Staff Revenue','₱4,940']].map(k=>`<div class="card p-5"><p class="text-xs font-bold text-slate-500 uppercase">${k[0]}</p><h2 class="text-3xl font-black text-blue-800">${k[1]}</h2></div>`).join('')}</div><div class="grid md:grid-cols-2 gap-4">${state.staff.map(s=>`<div class="card p-5"><h3 class="text-lg font-black">${s[0]}</h3><p>${s[1]} loads completed</p><p>Revenue: <b>₱${s[2]}</b></p><p>Salary: ₱${s[3]}</p><p>Revenue minus salary: <b>₱${s[2]-s[3]}</b></p><button onclick="toast('Detailed logs will connect to database')" class="mt-4 w-full bg-slate-900 text-white rounded-xl h-11 font-bold">View Detailed Logs</button></div>`).join('')}</div>`)}
function reports(){return shell('REPORTS',`<div class="grid md:grid-cols-3 gap-4 mb-5">${['Sales Today ₱12,450','Completed Loads 46','Average Ticket ₱296.42'].map(i=>`<div class="card p-5 text-xl font-black">${i}</div>`).join('')}</div><div class="card p-5"><h2 class="font-black mb-4">Revenue Trend</h2><div class="flex items-end gap-2 h-48">${[30,45,60,20,80,55,90].map(h=>`<div class="flex-1 bg-blue-100 rounded-t"><div class="bg-blue-800 rounded-t" style="height:${h}%;margin-top:${100-h}%"></div></div>`).join('')}</div></div>`)}
function pickup(){return shell('READY FOR PICKUP',`<h1 class="text-2xl font-black mb-4">14 Orders Pending</h1><div class="grid md:grid-cols-2 gap-4">${['Marcus Thompson — 3 days waiting — ₱242.50','Sarah Jenkins — 2 hours waiting — PAID'].map(o=>`<div class="card p-5"><b>${o}</b><button onclick="toast('Marked as picked up')" class="mt-4 w-full bg-blue-800 text-white h-12 rounded-xl font-bold">Mark Picked Up</button><button onclick="toast('Customer contact feature coming soon')" class="mt-2 w-full border h-10 rounded-xl font-bold">Contact Customer</button></div>`).join('')}</div>`)}
function delivery(){return shell('DELIVERY QUEUE',`<h1 class="text-2xl font-black mb-4">Delivery Queue</h1><div class="card p-5"><h2 class="text-lg font-black">Jonathan Wick</h2><p>123 Continental St. • Rider: Carlos R. • Due ₱42.50</p><div class="flex gap-2 mt-4"><button onclick="toast('Marked out for delivery')" class="bg-blue-800 text-white rounded-xl px-4 py-3 font-bold">Out For Delivery</button><button onclick="toast('Marked delivered')" class="bg-green-600 text-white rounded-xl px-4 py-3 font-bold">Delivered</button></div></div>`)}
function orderDetails(){return shell('ORDER DETAILS',`<div class="card p-5"><h1 class="text-2xl font-black text-blue-800">#ORD-2024-001</h1><p>Customer: Alice Smith</p><p>Service: Wash Dry Fold</p><p>Loads: 1</p><p>Status: In Progress</p><div class="flex gap-2 mt-5 flex-wrap"><button onclick="toast('Order marked ready')" class="bg-blue-800 text-white rounded-xl px-4 py-3 font-bold">Mark Ready</button><button onclick="toast('Order completed')" class="bg-slate-900 text-white rounded-xl px-4 py-3 font-bold">Mark Completed</button><button onclick="go('orders')" class="border rounded-xl px-4 py-3 font-bold">Back to Orders</button></div></div>`)}
function render(){const pages={dashboard,login,newOrder,orders,customers,inventory,reports,staff,pickup,delivery,orderDetails};document.getElementById('app').innerHTML=(pages[state.route]||dashboard)()}
render();
</script>
</body>
</html>
